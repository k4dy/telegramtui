name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

      - run: mvn package -DskipTests -Dtelegram.api.id=${{ secrets.TG_API_ID }} -Dtelegram.api.hash=${{ secrets.TG_API_HASH }}

      - uses: softprops/action-gh-release@v2
        with:
          name: TelegramTUI v${{ steps.version.outputs.VERSION }}
          files: target/telegramtui-${{ steps.version.outputs.VERSION }}.jar

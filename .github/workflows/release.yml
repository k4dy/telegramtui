name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - id: version
        run: echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

      - run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

      - run: mvn package -DskipTests -Dtelegram.api.id=${{ secrets.API_ID }} -Dtelegram.api.hash=${{ secrets.API_HASH }}

      - run: git tag v${{ steps.version.outputs.VERSION }} || true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: TelegramTUI v${{ steps.version.outputs.VERSION }}
          files: target/telegramtui-${{ steps.version.outputs.VERSION }}.jar
